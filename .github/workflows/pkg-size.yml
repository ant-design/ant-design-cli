name: Pkg Size

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  pkg-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Get pack size
        id: size
        run: |
          npm pack --dry-run --json > /tmp/pack.json 2>&1 || true
          PACK_JSON=$(grep -o '\[.*\]' /tmp/pack.json | tail -1)
          echo "size=$(echo "$PACK_JSON" | jq '.[0].size')" >> "$GITHUB_OUTPUT"
          echo "unpack_size=$(echo "$PACK_JSON" | jq '.[0].unpackedSize')" >> "$GITHUB_OUTPUT"

      - name: Get base branch size
        if: github.event_name == 'pull_request'
        id: base_size
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git checkout FETCH_HEAD -- . 2>/dev/null || true
          npm ci
          npm run build
          npm pack --dry-run --json > /tmp/base_pack.json 2>&1 || true
          PACK_JSON=$(grep -o '\[.*\]' /tmp/base_pack.json | tail -1)
          echo "size=$(echo "$PACK_JSON" | jq '.[0].size')" >> "$GITHUB_OUTPUT"
          echo "unpack_size=$(echo "$PACK_JSON" | jq '.[0].unpackedSize')" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./scripts/pkg-size-comment.js');
            await run({
              github, context,
              size: parseInt('${{ steps.size.outputs.size }}'),
              unpackSize: parseInt('${{ steps.size.outputs.unpack_size }}'),
              baseSize: parseInt('${{ steps.base_size.outputs.size }}') || parseInt('${{ steps.size.outputs.size }}'),
              baseUnpackSize: parseInt('${{ steps.base_size.outputs.unpack_size }}') || parseInt('${{ steps.size.outputs.unpack_size }}'),
            });
