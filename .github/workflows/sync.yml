name: Sync antd data

on:
  schedule:
    - cron: '37 8 * * *' # Daily at UTC 08:37 (Beijing 16:37)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Clone antd repo (shallow, filter tree)
        run: |
          git clone --filter=tree:0 --no-checkout \
            https://github.com/ant-design/ant-design.git antd-source

      - name: Sync v4, v5, v6 metadata
        run: |
          mkdir -p /tmp/antd-sync

          for major in 4 5 6; do
            echo "=== Syncing v${major} ==="

            ALL_TAGS=$(git ls-remote --tags --sort=v:refname \
              https://github.com/ant-design/ant-design.git \
              "refs/tags/${major}.*" \
              | grep -v '\^{}' \
              | sed 's|.*refs/tags/||')

            LATEST_TAG=$(echo "$ALL_TAGS" | tail -1)
            echo "Latest v${major}: $LATEST_TAG"

            # Build minor→best-patch map
            declare -A MINOR_BEST
            while IFS= read -r tag; do
              [[ -z "$tag" ]] && continue
              IFS='.' read -r _ tminor tpatch <<< "$tag"
              minor_key="${major}.${tminor}"
              cur="${MINOR_BEST[$minor_key]:-}"
              if [[ -z "$cur" ]]; then
                MINOR_BEST[$minor_key]="$tag"
              else
                IFS='.' read -r _ _ curpatch <<< "$cur"
                if [[ "$tpatch" -gt "$curpatch" ]]; then
                  MINOR_BEST[$minor_key]="$tag"
                fi
              fi
            done <<< "$ALL_TAGS"

            for key in "${!MINOR_BEST[@]}"; do
              echo "${key}:${MINOR_BEST[$key]}"
            done | sort > /tmp/antd-sync/v${major}-minors.txt
            unset MINOR_BEST

            # Extract primary (latest) snapshot
            cd antd-source && git checkout "$LATEST_TAG" && cd ..
            npx tsx scripts/extract.ts --antd-dir antd-source --output "data/v${major}.json"
            echo "Extracted data/v${major}.json from $LATEST_TAG"

            # Extract new per-minor snapshots (skip existing)
            while IFS=':' read -r minor_key tag; do
              [[ -z "$minor_key" || -z "$tag" ]] && continue
              snapshot="data/v${tag}.json"
              if [[ -f "$snapshot" ]]; then
                echo "Snapshot $snapshot already exists, skipping"
                continue
              fi
              echo "Extracting $minor_key → $tag"
              cd antd-source && git checkout "$tag" && cd ..
              npx tsx scripts/extract.ts --antd-dir antd-source --output "$snapshot"
            done < /tmp/antd-sync/v${major}-minors.txt

            # Update versions.json index
            node --input-type=module << EOF
              import { readFileSync, writeFileSync, existsSync } from 'fs';
              const file = 'data/versions.json';
              const index = existsSync(file) ? JSON.parse(readFileSync(file, 'utf8')) : {};
              const majorKey = 'v${major}';
              if (!index[majorKey]) index[majorKey] = {};
              const lines = readFileSync('/tmp/antd-sync/v${major}-minors.txt', 'utf8').trim().split('\n');
              for (const line of lines) {
                if (!line) continue;
                const [minorKey, tag] = line.split(':');
                index[majorKey][minorKey] = tag;
              }
              writeFileSync(file, JSON.stringify(index, null, 2) + '\n');
              console.log('Updated versions.json for v${major}');
          EOF
          done

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in data/"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "data: sync antd metadata"
            git push
          fi

  publish:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # Get latest commits from sync job

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci && npm run build

      - name: Bump version, tag, and publish
        run: |
          ANTD_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('data/v6.json','utf8')).version")
          npm version "$ANTD_VERSION" --no-git-tag-version --allow-same-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: v${ANTD_VERSION}"
          git tag "v${ANTD_VERSION}"
          git push && git push --tags
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
