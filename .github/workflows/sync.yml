name: Sync antd data

on:
  schedule:
    - cron: '37 * * * *' # Every hour at :37 (Beijing time varies)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Clone antd repo (shallow, filter tree)
        run: |
          git clone --filter=tree:0 --no-checkout \
            https://github.com/ant-design/ant-design.git antd-source

      - name: Sync v4, v5, v6 metadata
        run: npx tsx scripts/sync.ts --antd-dir antd-source

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push data changes
        run: |
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "No changes in data/"
          else
            VERSIONS=""
            for major in 4 5 6; do
              if ! git diff --quiet "data/v${major}.json"; then
                VER=$(node -p "JSON.parse(require('fs').readFileSync(\"data/v${major}.json\",'utf8')).version")
                VERSIONS="${VERSIONS:+${VERSIONS}, }v${major}@${VER}"
              fi
            done
            git add data/
            git commit -m "data: sync antd metadata${VERSIONS:+ (${VERSIONS})}"
            git push
          fi

      - name: Bump version and release if antd version changed
        run: |
          ANTD_VER=$(node -p "JSON.parse(require('fs').readFileSync('data/v6.json','utf8')).version")
          CLI_VER=$(node -p "require('./package.json').version")

          if [ "$ANTD_VER" = "$CLI_VER" ]; then
            echo "CLI version already at $CLI_VER, skipping release"
          elif git rev-parse "v${ANTD_VER}" >/dev/null 2>&1; then
            echo "Tag v${ANTD_VER} already exists, skipping"
          else
            echo "Bumping CLI version: $CLI_VER → $ANTD_VER"
            npm version "$ANTD_VER" --no-git-tag-version
            git add package.json package-lock.json
            git commit -m "chore: release v${ANTD_VER}"
            git tag "v${ANTD_VER}"
            git push
            git push --tags
          fi
