name: Sync antd data

on:
  schedule:
    - cron: '37 8 * * *' # Daily at UTC 08:37 (Beijing 16:37)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Clone antd repo (shallow, filter tree)
        run: |
          git clone --filter=tree:0 --no-checkout \
            https://github.com/ant-design/ant-design.git antd-source

      - name: Sync v4, v5, v6 metadata
        run: npx tsx scripts/sync.ts --antd-dir antd-source

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "No changes in data/"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            V4=$(node -p "JSON.parse(require('fs').readFileSync('data/v4.json','utf8')).version")
            V5=$(node -p "JSON.parse(require('fs').readFileSync('data/v5.json','utf8')).version")
            V6=$(node -p "JSON.parse(require('fs').readFileSync('data/v6.json','utf8')).version")
            git add data/
            git commit -m "data: sync antd metadata (v4@${V4}, v5@${V5}, v6@${V6})"
            git push
          fi
